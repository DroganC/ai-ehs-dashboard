<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>坦克大战 Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <canvas id="game" aria-label="坦克大战画布"></canvas>
      <div id="hud" class="hud" aria-live="polite">
        <div class="hudStat hudHp">
          <span class="hudInline">关卡 <b id="levelNum">1</b> 生命：<b id="playerHp">100</b></span>
        </div>
        <div class="hudStat hudScore">
          <span class="hudInline">分数：<b id="score">0</b></span>
        </div>
        <div class="hudStat hudEnemy">
          <span class="hudInline">剩余敌人：<b id="enemyLeft">0</b></span>
        </div>
        <div class="help">
          <div class="help-title">移动端控制</div>
          <div>左下摇杆：移动/转向</div>
          <div>右下开火：射击</div>
          <div>暂停/重开：按钮</div>
        </div>
      </div>
      <div id="overlay" class="overlay" hidden>
        <div class="overlay-card">
          <div id="overlayTitle" class="overlay-title">坦克大战</div>
          <div id="overlayMsg" class="overlay-msg"></div>
          <div id="overlayOptions" class="overlayOptions" aria-label="问答选项"></div>
          <button id="btnOverlayRestart" class="overlayBtn" type="button">
            重开
          </button>
          <div id="overlayHint" class="overlay-hint">按 <b>R</b> 重开</div>
        </div>
      </div>

      <div id="mobileControls" class="mobileControls" aria-hidden="true">
        <div id="joystick" class="joystick" aria-label="移动摇杆" role="application">
          <div id="joystickKnob" class="joystick-knob" aria-hidden="true"></div>
        </div>
        <div class="mobileBtns">
          <button id="btnShoot" class="mobileBtn mobileShoot" type="button" aria-label="开火">
            开火
          </button>
        </div>
      </div>
    </div>
    <script src="./game.js"></script>
  </body>
</html>
