<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Demo</title>
    <link rel="stylesheet" href="./style.css?v=20260325-1" />
  </head>
  <body>
    <div class="hud hud-right">
      <div class="stats">
        <span class="badge">关卡：<strong id="level">锂电池着火</strong></span>
        <span class="badge">得分：<strong id="score">0</strong></span>
      </div>
    </div>

    <div class="stage">
      <div class="canvas-wrap">
        <canvas id="game" width="576" height="576"></canvas>
      </div>

      <div class="overlay" id="overlay">
        <div class="overlay-inner" role="dialog" aria-modal="true">
          <h2 id="overlay-title">暂停</h2>
          <p id="overlay-text">空格暂停/继续，R 重开，M 切换模式</p>
          <div class="overlay-content" id="overlay-content"></div>
          <div class="overlay-actions">
            <button class="overlay-primary-btn" type="button" id="overlay-start">
              开始
            </button>
          </div>
        </div>
      </div>

      <div class="mobile-controls" id="mobile-controls">
        <div class="mobile-row">
          <button class="dir-btn" type="button" data-dir="up" aria-label="上">↑</button>
        </div>
        <div class="mobile-row">
          <button class="dir-btn" type="button" data-dir="left" aria-label="左">←</button>
          <button class="dir-btn" type="button" data-dir="down" aria-label="下">↓</button>
          <button class="dir-btn" type="button" data-dir="right" aria-label="右">→</button>
        </div>
      </div>
    </div>

    <script src="./game.js?v=20260325-1"></script>
    <script>
      window.SnakeDemo.mount();
    </script>
  </body>
</html>
