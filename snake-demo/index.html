<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Demo</title>
    <link rel="stylesheet" href="./style.css?v=20260325-1" />
  </head>
  <body>
    <div class="snake-root">
      <div class="snake__hud snake__hud--right">
        <div class="snake__hud-stats">
          <span class="snake__badge">关卡：<strong id="level">锂电池着火</strong></span>
          <span class="snake__badge">得分：<strong id="score">0</strong></span>
        </div>
      </div>

      <div class="snake">
        <div class="snake__canvas">
          <canvas class="snake__canvas-el" id="game" width="576" height="576"></canvas>
        </div>

        <div class="snake__overlay" id="overlay">
          <div class="snake__overlay-card" role="dialog" aria-modal="true">
            <h2 id="overlay-title">暂停</h2>
            <p id="overlay-text">空格暂停/继续，R 重开，M 切换模式</p>
            <div class="snake__overlay-content" id="overlay-content"></div>
            <div class="snake__overlay-actions">
              <button
                class="snake__overlay-btn snake__overlay-btn--primary"
                type="button"
                id="overlay-start"
              >
                开始
              </button>
            </div>
          </div>
        </div>

        <div class="snake__controls" id="mobile-controls">
          <div class="snake__controls-row">
            <button class="snake__control-btn" type="button" data-dir="up" aria-label="上">↑</button>
          </div>
          <div class="snake__controls-row">
            <button class="snake__control-btn" type="button" data-dir="left" aria-label="左">←</button>
            <button class="snake__control-btn" type="button" data-dir="down" aria-label="下">↓</button>
            <button class="snake__control-btn" type="button" data-dir="right" aria-label="右">→</button>
          </div>
        </div>
      </div>
    </div>

    <script src="./game.js?v=20260325-1"></script>
    <script>
      window.SnakeDemo.mount();
    </script>
  </body>
</html>
